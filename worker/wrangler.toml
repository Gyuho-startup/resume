# Cloudflare Worker Configuration for PDF Renderer
# Deploy: wrangler deploy

name = "uk-resume-builder-pdf-renderer"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Browser Rendering binding
# Enables headless Chrome for PDF generation
# See: https://developers.cloudflare.com/browser-rendering/
browser = { binding = "BROWSER" }

# Environment variables (set via wrangler secret put)
# PDF_RENDERER_TOKEN - Authentication token for API access

[vars]
# Non-secret environment variables
ALLOWED_ORIGINS = "http://localhost:3000,https://yourdomain.com"

# Rate limiting (optional)
# [rate_limit]
# requests_per_minute = 60
